<!doctype html>
<html>
<head>
  <title>Login</title>
  <style>
      /* -----------------------------
     BODY & CONTAINER
  ----------------------------- */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #007bff;
      }

      .container {
        max-width: 600px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      h2,
      h3,
      label {
        text-align: center;
      }

      /* -----------------------------
     LOGIN
  ----------------------------- */
      #loginContainer {
        max-width: 400px;
        margin: 80px auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 12px;
      }

      #loginContainer input {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      #loginBtn {
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #007bff;
        color: white;
        cursor: pointer;
      }

      #loginBtn:hover {
        background: #0056b3;
      }

      /* -----------------------------
     TOP BAR & LOGOUT
  ----------------------------- */
      .top-bar {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 20px;
      }

      .logout-btn {
        padding: 8px 14px;
        font-size: 13px;
        background: #dc3545;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .logout-btn:hover {
        background: #b02a37;
      }
      .logout-btn:active {
        transform: scale(0.95);
      }

      /* -----------------------------
     TASKS & RECOMMENDATION BOX
  ----------------------------- */
      #recommendationBox {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        display: none;
      }

      .task-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 14px;
        margin-bottom: 12px;
        border-radius: 10px;
        background: #fafafa;
        gap: 10px;
      }

      .task-content {
        flex: 1;
      }
      .task-name {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 4px;
        word-wrap: break-word;
      }
      .task-type {
        font-size: 12px;
        color: #777;
      }

      .task-btn {
        flex-shrink: 0;
        background-color: #007bff;
        color: white;
        border: none;
        padding: 6px 10px;
        font-size: 13px;
        border-radius: 6px;
        cursor: pointer;
        min-width: 60px;
      }

      .task-btn:hover {
        background-color: #0056b3;
      }

      /* -----------------------------
     CONTROLS
  ----------------------------- */
      .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        background: #f9f9f9;
        padding: 16px;
        border-radius: 12px;
        margin-top: 20px;
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        max-width: 400px;
      }

      .slider-row input[type="range"] {
        flex: 1;
      }

      #val {
        font-size: 16px;
        font-weight: 500;
        min-width: 40px;
        text-align: right;
      }

      #getTasksBtn,
      #openModalBtn,
      #toggleModulesBtn {
        padding: 10px 18px;
        font-size: 15px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
      }

      #openModalBtn {
        background-color: #28a745;
        color: white;
      }
      #openModalBtn:hover {
        background-color: #218838;
      }

      #toggleModulesBtn {
        background-color: #6c757d;
        color: white;
      }
      #toggleModulesBtn:hover {
        background-color: #5a6268;
      }

      /* -----------------------------
     MODALS
  ----------------------------- */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 90%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .modal-content input,
      .modal-content select {
        padding: 10px;
        font-size: 14px;
        border-radius: 6px;
        border: 1px solid #ccc;
        width: 100%;
      }

      .modal-actions {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .cancel {
        background: #ccc;
        color: black;
      }

      /* -----------------------------
     MODULES PANEL
  ----------------------------- */
      .modules-panel {
        margin: 10px 0 20px;
        padding: 15px;
        border-radius: 10px;
        background: #f9f9f9;
      }

      .module-item {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #eee;
      }

      .edit-btn {
        background: #ffc107;
        color: black;
        padding: 4px 8px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 12px;
        border: none;
      }

      .edit-btn:hover {
        background: #e0a800;
      }

      /* -----------------------------
     LOADING
  ----------------------------- */
      .loading-container {
        width: 100%;
        background: #eee;
        border-radius: 10px;
        overflow: hidden;
        height: 10px;
        margin-top: 10px;
      }

      .loading-bar {
        height: 100%;
        width: 40%;
        background: #007bff;
        border-radius: 10px;
        animation: loading 1s infinite ease-in-out;
      }

      @keyframes loading {
        0% {
          margin-left: -40%;
        }
        50% {
          margin-left: 50%;
        }
        100% {
          margin-left: 100%;
        }
      }

      /* -----------------------------
     RESPONSIVE
  ----------------------------- */
      @media (max-width: 600px) {
        body {
          background: white;
          padding: 10px;
        }
        .container {
          max-width: 100%;
          padding: 0 10px;
          margin: 0;
          background: transparent;
          box-shadow: none;
        }
        .task-name {
          font-size: 17px;
        }
        .task-type {
          font-size: 13px;
        }
        .task-btn {
          font-size: 12px;
          padding: 6px 8px;
        }
      }
      .signup-link {
  background: none;
  border: none;
  color: #007bff;
  cursor: pointer;
  font-size: 14px;
  text-decoration: underline;
}

.signup-link:hover {
  color: #0056b3;
}
    </style>
</head>
<body>
  <div id="loginContainer">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username" />
  <input type="password" id="password" placeholder="Password" />

  <button id="loginBtn">Login</button>

  <button id="signupBtn" class="signup-link">
  Don't have an account? 
    </button>
</div>

  <script>
    document.getElementById("signupBtn").onclick = () => {
  window.location.href = "/signup";
};
    document.getElementById("loginBtn").onclick = async () => {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (data.status === "success") {
          window.location.href = "/"; // go to main app
        } else {
          alert(data.message || "Invalid login");
        }
      } catch {
        alert("Login error");
      }
    };
  </script>
</body>
</html>
